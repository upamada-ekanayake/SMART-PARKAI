server:
  port: ${PORT:${SERVER_PORT:8080}}

spring:
  application:
    name: parksmart-ai
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/parksmart}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-to-at-least-32-characters}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
